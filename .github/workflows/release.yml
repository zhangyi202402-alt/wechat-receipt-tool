name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: go.sum

      - name: Install MinGW (CGO)
        run: choco install mingw -y

      - name: Add MinGW to PATH
        run: echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Build wechat-receipt.exe
        shell: pwsh
        env:
          CGO_ENABLED: "1"
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          go build -o release/wechat-receipt.exe ./cmd/wechat-receipt

      - name: Download OCR models and ONNX Runtime
        shell: pwsh
        run: ./scripts/download-models.ps1

      - name: Verify ONNX DLLs before package
        shell: pwsh
        run: |
          $lib = "release/lib"
          if (-not (Test-Path "$lib/onnxruntime.dll")) { throw "onnxruntime.dll missing" }
          Get-ChildItem "$lib/*.dll" | ForEach-Object { Write-Host "ORT DLL: $($_.Name)" }

      - name: Package release zip
        shell: pwsh
        run: ./scripts/package.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat-receipt-win64
          path: wechat-receipt-v1.0.0-win64.zip
          retention-days: 90

      - name: Update release tag
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa v1.0.0 -m "Release v1.0.0"
          git push origin v1.0.0 --force

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: v1.0.0
          files: wechat-receipt-v1.0.0-win64.zip
          generate_release_notes: true
          make_latest: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
