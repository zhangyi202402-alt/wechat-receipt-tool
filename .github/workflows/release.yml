name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: go.sum

      - name: Install MinGW (CGO)
        run: choco install mingw -y

      - name: Add MinGW to PATH
        run: echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Build wechat-receipt.exe
        shell: pwsh
        env:
          CGO_ENABLED: "1"
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          go build -o release/wechat-receipt.exe ./cmd/wechat-receipt

      - name: Download OCR models and ONNX Runtime
        shell: pwsh
        run: ./scripts/download-models.ps1

      - name: Package release zip
        shell: pwsh
        run: ./scripts/package.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wechat-receipt-win64
          path: wechat-receipt-v1.0.0-win64.zip
          retention-days: 90

      - name: Upload to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: wechat-receipt-v1.0.0-win64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
